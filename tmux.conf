# Change prefix to Ctrl+A
set -g prefix C-f
unbind C-b
bind C-f send-prefix

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Shell
set -g default-shell /opt/homebrew/bin/fish

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Window naming: use current directory, no auto-rename from process
setw -g automatic-rename on
setw -g automatic-rename-format "#{b:pane_current_path}"
set -g allow-rename off

# Large scrollback
set -g history-limit 100000

# Mouse support
set -g mouse on

# Vi mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Splits
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# No delay for escape
set -sg escape-time 0

# Status bar (uses terminal ANSI palette)
set -g status-position top
set -g status-justify left
set -g status-style "bg=default,fg=white"

set -g status-left ""
set -g status-right "#[fg=white] %Y-%m-%d %H:%M "

setw -g window-status-format "#[fg=white] #I #W "
setw -g window-status-current-format "#[fg=black,bg=green,bold] #I #W "

# Pane borders
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=green"

# Messages
set -g message-style "fg=white,bg=brightblack"
